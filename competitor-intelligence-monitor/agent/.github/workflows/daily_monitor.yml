name: Daily Competitor Monitor

on:
  # Triggered daily by cron-job.org at 8am ET via workflow_dispatch.
  # GitHub's built-in schedule is removed — it was consistently 4-10 hours late.
  workflow_dispatch:

permissions:
  contents: write  # needed to commit seen_urls.json back

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        working-directory: agent
        run: pip install -r requirements.txt

      - name: Run competitor monitor
        working-directory: agent
        env:
          NIMBLE_API_KEY: ${{ secrets.NIMBLE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          GH_API_KEY: ${{ secrets.GH_API_KEY }}
        run: python agent.py

      - name: Commit state files
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add agent/seen_urls.json agent/seen_context.json
          git diff --staged --quiet || git commit -m "chore: update seen state [skip ci]"
          git push
